version: "3.8"

services:
  mariadb:
    image: mariadb:10.11
    container_name: reservation_mariadb
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      TZ: ${TZ}
    ports:
      - "${DB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    networks:
      - reservation_network
    restart: always

  redis:
    image: redis:7.2-alpine
    container_name: reservation_redis
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      TZ: ${TZ}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - reservation_network
    restart: always

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: reservation_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      TZ: ${TZ}
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - reservation_network
    restart: always

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.3
    container_name: reservation_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      TZ: ${TZ}
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data
      - zookeeper_log:/var/lib/zookeeper/log
    networks:
      - reservation_network
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.3
    container_name: reservation_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      # .env 파일에 KAFKA_HOST=192.168.0.10 항목을 추가하면 서버 환경에 맞게 자동 반영됩니다.
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://${KAFKA_HOST:-127.0.0.1}:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      TZ: ${TZ}
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - reservation_network
    restart: always

volumes:
  mariadb_data:
  redis_data:
  rabbitmq_data:
  zookeeper_data:
  zookeeper_log:
  kafka_data:

networks:
  reservation_network:
    driver: bridge
